name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script_stop: true
          script: |
            REPO_DIR="$HOME/EnergyTracker"
            REPO_URL="https://github.com/levieohlund/EnergyTracker.git"

            # Säkerställ att mappen är en riktig git-repo
            if [ ! -d "$REPO_DIR/.git" ]; then
              rm -rf "$REPO_DIR"
              git clone "$REPO_URL" "$REPO_DIR"
            fi

            # Hämta senaste kod från main
            git -C "$REPO_DIR" fetch origin main
            git -C "$REPO_DIR" checkout main
            git -C "$REPO_DIR" pull origin main

            # Starta appen med Docker
            cd "$REPO_DIR"
            sudo docker compose up --build -d || sudo docker-compose up --build -d
