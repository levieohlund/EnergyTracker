name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script_stop: true
          script: |
            # Om mappen inte finns, ladda ner (clona) projektet från GitHub
            [ -d EnergyTracker ] || git clone https://github.com/levieohlund/EnergyTracker.git

            # Gå in i mappen
            cd EnergyTracker

            # Hämta den senaste koden
            git pull origin main

            # Starta appen med Docker
            sudo docker compose up --build -d || sudo docker-compose up --build -d
