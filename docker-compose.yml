services:
  api:
    build: .
    environment:
      - DB_FILE=/app/data/energy.db
    ports:
      - "8000:8000"
    volumes:
      - energy_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  energy_data:
